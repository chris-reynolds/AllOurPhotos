<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Year-Month Status Grid</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 5px;
        }
        
        .status-grid {
            border-collapse: collapse;
            width: 100%;
            max-width: 900px;
        }
        
        .status-grid th {
            border: 1px solid #ddd;
            padding: 2px;
            text-align: center;
            font-size: small;
        }

        .status-grid td {
            border: 1px solid #ddd;
            padding: 4px;
            text-align: center;
        }
        .status-grid th {
            background-color: #f2f2f2;
            position: sticky;
            top: 0;
        }
        
        .year-column {
            background-color: #f2f2f2;
            font-weight: bold;
            text-align: right;
        }
        
        .status-icon {
            width: 7%;
            height: 15px;
            display: inline-block;
            border-radius: 50%;
        }
        
        .status-complete {
            background-color: #4CAF50; /* Green */
        }
        
        .status-pending {
            background-color: #FFC107; /* Yellow */
        }
        
        .status-incomplete {
            background-color: #F44336; /* Red */
        }
        
        .status-na {
            background-color: #9E9E9E; /* Gray */
        }
    </style>
</head>
<body>
    <table class="status-grid">
        <thead>
            <tr>
                <th>Year</th>
                <th>Jan</th>
                <th>Feb</th>
                <th>Mar</th>
                <th>Apr</th>
                <th>May</th>
                <th>Jun</th>
                <th>Jul</th>
                <th>Aug</th>
                <th>Sep</th>
                <th>Oct</th>
                <th>Nov</th>
                <th>Dec</th>
            </tr>
        </thead>
        <tbody>
            <tr>                
                <td class="year-column">2022</td>
                <td><div class="status-icon status-incomplete" title="Incomplete"></div></td>
                <td><div class="status-icon status-incomplete" title="Incomplete"></div></td>
                <td><div class="status-icon status-incomplete" title="Incomplete"></div></td>
                <td><div class="status-icon status-incomplete" title="Incomplete"></div></td>
                <td><div class="status-icon status-incomplete" title="Incomplete"></div></td>
                <td><div class="status-icon status-incomplete" title="Incomplete"></div></td>
                <td><div class="status-icon status-na" title="Not Available"></div></td>
                <td><div class="status-icon status-na" title="Not Available"></div></td>
                <td><div class="status-icon status-na" title="Not Available"></div></td>
                <td><div class="status-icon status-na" title="Not Available"></div></td>
                <td><div class="status-icon status-na" title="Not Available"></div></td>
                <td><div class="status-icon status-na" title="Not Available"></div></td>
            </tr>
            <tr>
                <td class="year-column">2023</td>
                <td><div class="status-icon status-complete" title="Complete"></div></td>
                <td><div class="status-icon status-complete" title="Complete"></div></td>
                <td><div class="status-icon status-complete" title="Complete"></div></td>
                <td><div class="status-icon status-complete" title="Complete"></div></td>
                <td><div class="status-icon status-complete" title="Complete"></div></td>
                <td><div class="status-icon status-complete" title="Complete"></div></td>
                <td><div class="status-icon status-complete" title="Complete"></div></td>
                <td><div class="status-icon status-complete" title="Complete"></div></td>
                <td><div class="status-icon status-complete" title="Complete"></div></td>
                <td><div class="status-icon status-complete" title="Complete"></div></td>
                <td><div class="status-icon status-complete" title="Complete"></div></td>
                <td><div class="status-icon status-complete" title="Complete"></div></td>
            </tr>
            <tr>
                <td class="year-column">2024</td>
                <td><div class="status-icon status-complete" title="Complete"></div></td>
                <td><div class="status-icon status-complete" title="Complete"></div></td>
                <td><div class="status-icon status-complete" title="Complete"></div></td>
                <td><div class="status-icon status-complete" title="Complete"></div></td>
                <td><div class="status-icon status-complete" title="Complete"></div></td>
                <td><div class="status-icon status-pending" title="Pending"></div></td>
                <td><div class="status-icon status-incomplete" title="Incomplete"></div></td>
                <td><div class="status-icon status-incomplete" title="Incomplete"></div></td>
                <td><div class="status-icon status-incomplete" title="Incomplete"></div></td>
                <td><div class="status-icon status-incomplete" title="Incomplete"></div></td>
                <td><div class="status-icon status-incomplete" title="Incomplete"></div></td>
                <td><div class="status-icon status-incomplete" title="Incomplete"></div></td>
            </tr>
            <tr>
                <td class="year-column">2025</td>
                <td><div class="status-icon status-incomplete" title="Incomplete"></div></td>
                <td><div class="status-icon status-incomplete" title="Incomplete"></div></td>
                <td><div class="status-icon status-incomplete" title="Incomplete"></div></td>
                <td><div class="status-icon status-incomplete" title="Incomplete"></div></td>
                <td><div class="status-icon status-incomplete" title="Incomplete"></div></td>
                <td><div class="status-icon status-incomplete" title="Incomplete"></div></td>
                <td><div class="status-icon status-na" title="Not Available"></div></td>
                <td><div class="status-icon status-na" title="Not Available"></div></td>
                <td><div class="status-icon status-na" title="Not Available"></div></td>
                <td><div class="status-icon status-na" title="Not Available"></div></td>
                <td><div class="status-icon status-na" title="Not Available"></div></td>
                <td><div class="status-icon status-na" title="Not Available"></div></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
